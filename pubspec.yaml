name: i18n_editor
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  file_selector: ^1.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"

  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 256

  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"

  linux:
    generate: true
    image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
